services:
  - type: web
    name: codm-eval-ai-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_STORAGE_BUCKET
        value: screenshots
      - key: FUZZY_MATCH_MIN_SCORE
        value: "80"
      # Secrets — entered once in the Render dashboard, never committed:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # The deployed Vercel frontend origin(s), comma-separated — set once
      # the Vercel URL is known.
      - key: ALLOWED_ORIGINS
        sync: false
